<m-model id="controllable-character" x="0" y="0" z="0" ry="0" src="https://mml.mgz.me/assets//models/bot.glb" ry="0"
  collide="false">
  <m-attr-lerp attr="x,y,z,ry" duration="100"></m-attr-lerp>
  <m-animation id="idle-mix" src="https://mml.mgz.me/assets//models/anim_idle.glb" weight="1.0">
    <m-attr-lerp id="idle-lerp" attr="all" duration="1000" easing="easeInOutCubic"></m-attr-lerp>
  </m-animation>
  <m-animation id="run-mix" src="https://mml.mgz.me/assets//models/anim_run.glb" weight="0.0">
    <m-attr-lerp id="run-lerp" attr="all" duration="1000" easing="easeInOutCubic"></m-attr-lerp>
  </m-animation>
  <m-animation id="air-mix" src="https://mml.mgz.me/assets//models/anim_air.glb" weight="0.0">
    <m-attr-lerp id="air-lerp" attr="all" duration="1000" easing="easeInOutCubic"></m-attr-lerp>
  </m-animation>
</m-model>

<m-cube id="floor" width="1000" height="0.01" depth="1000" color="#99ccff"></m-cube>

<m-control id="movement-control" type="axis" axis="0,1" hint="Move"></m-control>
<m-control id="jump-control" type="button" button="0" hint="Jump"></m-control>

<!-- uncomment the code below to try the following camera thingie
we still need to decide on how to deal with third-person camera etc
cause forward right now only means in world-space and doesn't care
about the cam pos -->

<!-- <m-camera id="my-camera" x="0" y="2" z="3" ry="0" fov="60">
  <m-attr-lerp id="cam-lerp" attr="x,y,z,ry" duration="100"></m-attr-lerp>
</m-camera> -->

<script>
  const idleMix = document.getElementById('idle-mix');
  const idleLerp = document.getElementById('idle-lerp');
  const runMix = document.getElementById('run-mix');
  const runLerp = document.getElementById('run-lerp');
  const airMix = document.getElementById('air-mix');
  const airLerp = document.getElementById('air-lerp');

  const myCamera = document.getElementById("my-camera");
  const camLerp = document.getElementById("cam-lerp");

  const controllableCharacter = document.getElementById('controllable-character');
  const controllableIdleMix = document.getElementById('controllable-character').querySelector('#idle-mix');
  const controllablerunMix = document.getElementById('controllable-character').querySelector('#run-mix');
  const controllableAirMix = document.getElementById('controllable-character').querySelector('#air-mix');
  const movementControl = document.getElementById('movement-control');
  const jumpControl = document.getElementById('jump-control');

  const movementMap = new Map();
  const jumpMap = new Map();
  let isControllableWalking = false;

  let currentSpeed = 0;
  let targetSpeed = 0;
  let lastMovementDirection = {
    x: 0,
    y: 0
  };

  let currentY = 0;
  let currentVelocityY = 0;
  let isJumping = false;
  const jumpForce = 1.3;
  const gravity = 0.3;
  const groundY = 0;

  const maxSpeed = 0.7;
  const speedIncreaseLerpRate = 0.2;
  const speedDecreaseLerpRate = 0.4;
  const updateInterval = 100;

  // Camera following settings
  const cameraDistance = -3; // Distance behind the player
  const cameraHeight = 2; // Height above the player
  const cameraLerpRate = 0.3; // How smoothly the camera follows (0-1)

  idleLerp.setAttribute('duration', updateInterval * 4);
  runLerp.setAttribute('duration', updateInterval * 4);
  airLerp.setAttribute('duration', updateInterval * 2);

  function lerpSpeed(current, target, deltaTime) {
    const rate = target > current ? speedIncreaseLerpRate : speedDecreaseLerpRate;
    const lerpFactor = rate * (deltaTime / updateInterval);
    return current + (target - current) * lerpFactor;
  }

  movementControl.addEventListener("input", (event) => {
    const {
      connectionId,
      value
    } = event.detail;
    const {
      x,
      y
    } = value;
    movementMap.set(connectionId, {
      x,
      y
    });
  });

  jumpControl.addEventListener("input", (event) => {
    const {
      connectionId,
      value
    } = event.detail;
    jumpMap.set(connectionId, value);

    if (value > 0.5 && !isJumping && currentY <= groundY + 0.1) {
      currentVelocityY = jumpForce;
      isJumping = true;
    }
  });

  window.addEventListener("disconnected", (event) => {
    const {
      connectionId
    } = event.detail;
    if (movementMap.has(connectionId)) {
      movementMap.delete(connectionId);
    }
    if (jumpMap.has(connectionId)) {
      jumpMap.delete(connectionId);
    }
  });

  let lastUpdateTime = Date.now();

  setInterval(() => {
    const currentTime = Date.now();
    const deltaTime = currentTime - lastUpdateTime;
    lastUpdateTime = currentTime;

    const currentX = parseFloat(controllableCharacter.getAttribute('x'));
    const currentZ = parseFloat(controllableCharacter.getAttribute('z'));
    const currentRotation = parseFloat(controllableCharacter.getAttribute('ry'));
    currentY = parseFloat(controllableCharacter.getAttribute('y'));

    let hasMovement = false;
    let targetX = currentX;
    let targetZ = currentZ;
    let targetRotation = currentRotation;

    movementMap.forEach((value, connectionId) => {
      const {
        x,
        y
      } = value;
      if (Math.abs(x) > 0.1 || Math.abs(y) > 0.1) {
        hasMovement = true;

        // Invert controls when using external camera (no myCamera element)
        const inputX = myCamera ? -x : x;
        const inputY = myCamera ? y : -y;

        lastMovementDirection = {
          x: inputX,
          y: inputY
        };
        if (Math.abs(inputX) > 0.1 || Math.abs(inputY) > 0.1) {
          targetRotation = Math.atan2(inputX, inputY) * (180 / Math.PI);
        }
      }
    });

    targetSpeed = hasMovement ? maxSpeed : 0;
    currentSpeed = lerpSpeed(currentSpeed, targetSpeed, deltaTime);

    if (hasMovement) {
      movementMap.forEach((value, connectionId) => {
        const {
          x,
          y
        } = value;
        if (Math.abs(x) > 0.1 || Math.abs(y) > 0.1) {
          // Invert controls when using external camera (no myCamera element)
          const inputX = myCamera ? -x : x;
          const inputY = myCamera ? y : -y;

          const moveX = inputX * currentSpeed;
          const moveZ = inputY * currentSpeed;

          targetX += moveX;
          targetZ += moveZ;
        }
      });
    } else if (currentSpeed > 0.01) {
      const moveX = lastMovementDirection.x * currentSpeed;
      const moveZ = lastMovementDirection.y * currentSpeed;

      targetX += moveX;
      targetZ += moveZ;
    }

    currentVelocityY -= gravity;
    currentY += currentVelocityY;

    if (currentY <= groundY) {
      currentY = groundY;
      currentVelocityY = 0;
      isJumping = false;
    }

    if (hasMovement || currentSpeed > 0.01) {
      controllableCharacter.setAttribute('x', targetX);
      controllableCharacter.setAttribute('z', targetZ);
      controllableCharacter.setAttribute('ry', targetRotation);
    }
    controllableCharacter.setAttribute('y', currentY);

    if (myCamera) {
      // Camera following logic
      const currentCameraX = parseFloat(myCamera.getAttribute('x'));
      const currentCameraY = parseFloat(myCamera.getAttribute('y'));
      const currentCameraZ = parseFloat(myCamera.getAttribute('z'));
      const currentCameraRY = parseFloat(myCamera.getAttribute('ry'));

      // Calculate desired camera position behind the player
      const behindPlayerAngle = targetRotation + 180; // 180 degrees behind player
      const behindPlayerRad = behindPlayerAngle * (Math.PI / 180);
      const desiredCameraX = targetX + Math.sin(behindPlayerRad) * Math.abs(cameraDistance);
      const desiredCameraZ = targetZ + Math.cos(behindPlayerRad) * Math.abs(cameraDistance);
      const desiredCameraY = currentY + cameraHeight;
      const desiredCameraRY = behindPlayerAngle; // Inverse angle to look at player

      // Lerp camera position and rotation
      const newCameraX = currentCameraX + (desiredCameraX - currentCameraX) * cameraLerpRate;
      const newCameraY = currentCameraY + (desiredCameraY - currentCameraY) * cameraLerpRate;
      const newCameraZ = currentCameraZ + (desiredCameraZ - currentCameraZ) * cameraLerpRate;

      // Handle rotation lerping (accounting for 360-degree wrap-around)
      let rotationDiff = desiredCameraRY - currentCameraRY;

      // Normalize the difference to always take the shortest path
      while (rotationDiff > 180) rotationDiff -= 360;
      while (rotationDiff < -180) rotationDiff += 360;

      const newCameraRY = currentCameraRY + rotationDiff * cameraLerpRate;

      // Apply new camera position and rotation
      myCamera.setAttribute('x', newCameraX);
      myCamera.setAttribute('y', newCameraY);
      myCamera.setAttribute('z', newCameraZ);
      myCamera.setAttribute('ry', newCameraRY);
    }

    if (isJumping) {
      controllableIdleMix.setAttribute('weight', '0.0');
      controllablerunMix.setAttribute('weight', '0.0');
      controllableAirMix.setAttribute('weight', '1.0');
      isControllableWalking = false;
    } else if (hasMovement) {
      controllableIdleMix.setAttribute('weight', '0.0');
      controllablerunMix.setAttribute('weight', '1.0');
      controllableAirMix.setAttribute('weight', '0.0');
      isControllableWalking = true;
    } else {
      controllableIdleMix.setAttribute('weight', '1.0');
      controllablerunMix.setAttribute('weight', '0.0');
      controllableAirMix.setAttribute('weight', '0.0');
      isControllableWalking = false;
    }
  }, 100);
</script>
