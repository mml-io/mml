<m-plane opacity="0.25" color="blue" width="20" height="20" y="0" rx="-90"></m-plane>
<m-light type="spotlight" ry="45" rx="65" rz="-45" x="10" y="10" z="10"></m-light>

<m-frame
    x="-20"
    y="5"
    debug="true"
    min-x="-2"
    max-x="2"
    min-y="0"
    max-y="5"
    min-z="-2"
    max-z="2">
  <m-cube y="0.51" color="red" collide="true">
    <m-cube color="green" x="1" y="1" z="-1" collide="true">
      <m-attr-anim attr="sx" start="0.25" end="2.5" ping-pong="true" duration="10000"></m-attr-anim>
      <m-cube color="blue" x="1" y="1" z="0" collide="true">
        <m-attr-anim attr="x" start="0" end="-1" ping-pong="true" duration="10000"></m-attr-anim>
      </m-cube>
    </m-cube>
  </m-cube>

  <m-sphere x="-0.25" z="1.5" y="0.51" color="red" collide="true">
    <m-sphere color="green" x="1" y="1" z="-1" collide="true">
      <m-attr-anim attr="sx" start="0.25" end="2.5" ping-pong="true" duration="10000"></m-attr-anim>
      <m-sphere color="blue" x="1" y="1" z="0" collide="true">
        <m-attr-anim attr="x" start="0" end="-1" ping-pong="true" duration="10000"></m-attr-anim>
      </m-sphere>
    </m-sphere>
  </m-sphere>
<!--  <m-attr-anim attr="rz" start="0" end="360" ping-pong="true" duration="10000"></m-attr-anim>-->
  <m-attr-anim attr="sx" start="0.25" end="2" ping-pong="true" duration="10000"></m-attr-anim>
  <m-attr-anim attr="sy" start="0.25" end="2" ping-pong="true" duration="10000"></m-attr-anim>
  <m-attr-anim attr="sz" start="0.25" end="2" ping-pong="true" duration="10000"></m-attr-anim>
</m-frame>
